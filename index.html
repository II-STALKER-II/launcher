<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>FINAL DAWN</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:black;
    color:white;
}

/* VIDEO BACKGROUND */

.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1920') center/cover no-repeat;
    filter:brightness(0.3);
    animation:bgzoom 20s infinite alternate;
}

@keyframes bgzoom{
    from{
        transform:scale(1);
    }

    to{
        transform:scale(1.1);
    }
}

/* OVERLAY */

.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.55);
}

/* PARTICLES */

.particles span{
    position:absolute;
    width:4px;
    height:4px;
    background:orange;
    border-radius:50%;
    animation:float 10s linear infinite;
    opacity:0.7;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:0;
    }

    to{
        transform:translateY(-10vh);
        opacity:1;
    }
}

/* MAIN UI */

.container{
    position:relative;
    z-index:2;
    text-align:center;
    top:50%;
    transform:translateY(-50%);
}

/* TITLE */

h1{
    font-size:110px;
    color:orange;
    text-shadow:
    0 0 10px orange,
    0 0 20px orange,
    0 0 40px red;

    animation:pulse 3s infinite;
}

@keyframes pulse{
    0%{
        text-shadow:
        0 0 10px orange,
        0 0 20px orange;
    }

    50%{
        text-shadow:
        0 0 20px orange,
        0 0 40px red,
        0 0 80px orange;
    }

    100%{
        text-shadow:
        0 0 10px orange,
        0 0 20px orange;
    }
}

.subtitle{
    margin-top:10px;
    font-size:28px;
    color:#ccc;
    letter-spacing:4px;
}

/* BUTTON */

.join-btn{
    display:inline-block;
    margin-top:50px;
    padding:18px 50px;

    border:2px solid orange;
    border-radius:12px;

    color:white;
    text-decoration:none;
    font-size:24px;
    font-weight:bold;

    transition:0.3s;
    position:relative;
    overflow:hidden;
}

.join-btn:hover{
    background:orange;
    color:black;

    transform:scale(1.05);

    box-shadow:
    0 0 20px orange,
    0 0 40px red;
}

/* SERVER INFO */

.server-box{
    margin-top:50px;

    display:inline-block;

    padding:25px 50px;

    border:1px solid rgba(255,140,0,0.4);

    background:rgba(0,0,0,0.45);

    backdrop-filter:blur(5px);

    border-radius:15px;

    box-shadow:
    0 0 20px rgba(255,140,0,0.2);
}

.server-box p{
    margin:10px 0;
    font-size:22px;
}

/* FOOTER */

.footer{
    position:absolute;
    bottom:20px;
    width:100%;
    text-align:center;
    color:#777;
    font-size:14px;
}

/* RESPONSIVE */

@media(max-width:900px){

    h1{
        font-size:60px;
    }

    .subtitle{
        font-size:18px;
    }

    .join-btn{
        font-size:18px;
        padding:14px 30px;
    }

    .server-box{
        width:90%;
    }
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="overlay"></div>

<div class="particles">
    <span style="left:10%;animation-delay:0s;"></span>
    <span style="left:20%;animation-delay:2s;"></span>
    <span style="left:30%;animation-delay:4s;"></span>
    <span style="left:40%;animation-delay:1s;"></span>
    <span style="left:50%;animation-delay:5s;"></span>
    <span style="left:60%;animation-delay:3s;"></span>
    <span style="left:70%;animation-delay:6s;"></span>
    <span style="left:80%;animation-delay:2s;"></span>
    <span style="left:90%;animation-delay:4s;"></span>
</div>

<div class="container">

<h1>FINAL DAWN</h1>

<div class="subtitle">
DAYZ STALKER SURVIVAL
</div>

<a class="join-btn" href="steam://connect/178.159.214.232:2300">
JOIN SERVER
</a>

<div class="server-box">

<p>☢️ SERVER STATUS: ONLINE</p>

<p>🎮 IP: 178.159.214.232:2300</p>

<p>🔥 MODDED EXPERIENCE</p>

<p>💀 HARDCORE SURVIVAL</p>

</div>

</div>

<div class="footer">
FINAL DAWN © 2026
</div>

</body>
</html>
