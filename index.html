<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:'Orbitron',sans-serif;
    background:black;
    color:#fff;
}

/* BACKGROUND */

.background{
    position:fixed;
    width:100%;
    height:100%;
    background:
    linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.75)),
    url('https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?q=80&w=1920') center/cover no-repeat;

    animation:bgMove 25s infinite alternate;
}

@keyframes bgMove{

    from{
        transform:scale(1);
    }

    to{
        transform:scale(1.08);
    }
}

/* RADIATION OVERLAY */

.radiation{
    position:absolute;
    width:100%;
    height:100%;

    background:
    repeating-linear-gradient(
        0deg,
        rgba(0,255,0,0.02),
        rgba(0,255,0,0.02) 1px,
        transparent 1px,
        transparent 3px
    );

    pointer-events:none;

    animation:scan 8s linear infinite;
}

@keyframes scan{

    from{
        transform:translateY(-100%);
    }

    to{
        transform:translateY(100%);
    }
}

/* GLITCH EFFECT */

.glitch{
    position:relative;
    font-size:110px;
    color:#ff9800;
    text-transform:uppercase;

    text-shadow:
    0 0 10px #ff9800,
    0 0 20px red,
    0 0 40px orange;

    animation:flicker 3s infinite;
}

.glitch::before,
.glitch::after{
    content:attr(data-text);

    position:absolute;
    left:0;
    width:100%;
    overflow:hidden;
}

.glitch::before{
    color:red;
    z-index:-1;
    animation:glitchTop 2s infinite linear alternate-reverse;
}

.glitch::after{
    color:cyan;
    z-index:-2;
    animation:glitchBottom 2s infinite linear alternate-reverse;
}

@keyframes glitchTop{
    0%{clip-path:inset(0 0 80% 0);transform:translate(-2px,-2px);}
    100%{clip-path:inset(60% 0 0 0);transform:translate(2px,2px);}
}

@keyframes glitchBottom{
    0%{clip-path:inset(80% 0 0 0);transform:translate(2px,2px);}
    100%{clip-path:inset(0 0 60% 0);transform:translate(-2px,-2px);}
}

@keyframes flicker{

    0%{opacity:1;}
    50%{opacity:0.9;}
    52%{opacity:0.5;}
    55%{opacity:1;}
    100%{opacity:1;}
}

/* MAIN CONTAINER */

.container{
    position:relative;
    z-index:5;

    width:100%;
    height:100vh;

    display:flex;
    flex-direction:column;

    justify-content:center;
    align-items:center;

    text-align:center;
}

/* SUBTITLE */

.subtitle{
    margin-top:10px;
    color:#bbb;
    font-size:24px;
    letter-spacing:6px;
}

/* BUTTONS */

.buttons{
    margin-top:50px;

    display:flex;
    gap:25px;
    flex-wrap:wrap;
    justify-content:center;
}

.btn{
    padding:18px 45px;

    border:2px solid #ff9800;

    color:white;
    text-decoration:none;

    border-radius:12px;

    font-size:20px;
    font-weight:bold;

    transition:0.3s;

    background:rgba(0,0,0,0.4);

    backdrop-filter:blur(5px);

    box-shadow:
    0 0 15px rgba(255,152,0,0.3);
}

.btn:hover{

    transform:scale(1.08);

    background:#ff9800;
    color:black;

    box-shadow:
    0 0 20px orange,
    0 0 50px red;
}

/* INFO PANEL */

.panel{

    margin-top:60px;

    width:700px;
    max-width:90%;

    padding:30px;

    border:1px solid rgba(255,152,0,0.3);

    border-radius:15px;

    background:rgba(0,0,0,0.45);

    backdrop-filter:blur(10px);

    box-shadow:
    0 0 25px rgba(255,152,0,0.15);
}

.panel h2{
    margin-bottom:20px;
    color:#ff9800;
}

.panel p{
    margin:12px 0;
    font-size:18px;
    color:#ddd;
}

/* STATUS DOT */

.status{
    display:inline-block;

    width:12px;
    height:12px;

    background:lime;

    border-radius:50%;

    margin-right:10px;

    box-shadow:
    0 0 10px lime;
}

/* FOOTER */

.footer{
    position:absolute;
    bottom:20px;

    width:100%;

    text-align:center;

    color:#666;

    font-size:14px;
}

/* RESPONSIVE */

@media(max-width:900px){

    .glitch{
        font-size:60px;
    }

    .subtitle{
        font-size:16px;
    }

    .btn{
        font-size:16px;
        padding:14px 28px;
    }

    .panel{
        width:95%;
    }
}

</style>
